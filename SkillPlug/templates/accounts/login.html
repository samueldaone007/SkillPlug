{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 mt-8">
    <h1 class="text-2xl font-bold mb-6 text-center">Welcome Back</h1>
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {{ form.login }}
        {{form.username}}
        {{ form.password }}
        {{ form.remember }}
        <button type="submit" class="w-full py-2.5 bg-ng-600 text-white rounded-lg font-semibold hover:bg-ng-700">Login</button>
    </form>
    <p class="mt-4 text-center text-sm">New here? <a href="{% url 'account_signup' %}" class="text-ng-600 hover:underline">Create account</a></p>
</div>
{% endblock %}
